<script>
(function(){var done=false;function hide(){if(done)return;done=true;var s=document.getElementById('splash');if(s)s.classList.add('out');}
window.__hideSplash=hide;                 /* app.js mounted 后立即调用 */
setTimeout(hide,1600);                    /* 兜底：即使应用挂载失败也不久等 */
})();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).then(function(reg){
      reg.update();
      setInterval(function(){ reg.update(); }, 60*60*1000);
    }).catch(function(){});
    // 说明：曾在 controllerchange 时强制 reload 以确保新 SW 接管，但本站同源资源走 networkFirst
