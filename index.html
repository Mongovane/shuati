<style>
html,body{margin:0;background:#F5F6F2}
[data-theme=dark] body,[data-theme=dark]{background:#10141B}
/* 系统深色兜底：即便早期脚本未及时设 data-theme，也不让状态栏区域露出浅底 */
@media(prefers-color-scheme:dark){ html:not([data-theme=light]),html:not([data-theme=light]) body{background:#10141B} }
#splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#F5F6F2;transition:opacity .5s ease,visibility .5s ease}
[data-theme=dark] #splash{background:#10141B}
@media(prefers-color-scheme:dark){ html:not([data-theme=light]) #splash{background:#10141B} }
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.sp-w{font-family:'Snell Roundhand','Segoe Script','Brush Script MT','Xingkai SC','STXingkai',cursive;font-size:clamp(56px,14vw,88px);color:#2E45C4;white-space:nowrap;letter-spacing:3px;opacity:0;clip-path:inset(0 100% 0 0);animation:spR 1.4s .3s cubic-bezier(.22,.61,.36,1) forwards}
[data-theme=dark] .sp-w{color:#6B8AFF}
@keyframes spR{to{opacity:1;clip-path:inset(0 0 0 0)}}
</style>

<meta id="theme-color-dynamic" name="theme-color" content="#F5F6F2">
<script>
(function(){try{
  var t=localStorage.getItem('zb_theme')||'auto';
  var dark = t==='dark' || (t==='auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  var v = dark?'dark':'light';
  document.documentElement.dataset.theme=v;
  var m=document.getElementById('theme-color-dynamic'); if(m)m.setAttribute('content', dark?'#10141B':'#F5F6F2');
}catch(e){}})();
</script>

setTimeout(hide,1600);                    /* 兜底：即使应用挂载失败也不久等 */
})();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).then(function(reg){
      reg.update();
      setInterval(function(){ reg.update(); }, 60*60*1000);
    }).catch(function(){});
    // 注意：不要在 controllerchange 时 window.location.reload()。
    // 那会在后台检测到新版本(或 SW 重新激活)时随机刷新页面，可能打断用户正在进行的操作
    // （例如 AI 正在生成到一半被刷掉）。本站同源资源走 networkFirst，用户下次自然打开即拿到最新，无需强制刷新。
  });
}
