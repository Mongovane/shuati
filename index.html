<title>刷题文档</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='4' y='3' width='16' height='18' rx='3' fill='%234b5563'/%3E%3Crect x='7' y='7' width='10' height='1.6' rx='.8' fill='%23ffffff'/%3E%3Crect x='7' y='11' width='10' height='1.6' rx='.8' fill='%23ffffff'/%3E%3Crect x='7' y='15' width='6' height='1.6' rx='.8' fill='%23ffffff'/%3E%3C/svg%3E" />

<style>
html,body{margin:0;background:#F5F6F2}
[data-theme=dark] body,[data-theme=dark]{background:#10141B}
#splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#F5F6F2;transition:opacity .5s ease,visibility .5s ease}
[data-theme=dark] #splash{background:#10141B}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.sp-w{font-family:'Sacramento',cursive;font-size:clamp(56px,14vw,88px);color:#2E45C4;white-space:nowrap;letter-spacing:3px;opacity:0;clip-path:inset(0 100% 0 0);animation:spR 1.4s .3s cubic-bezier(.22,.61,.36,1) forwards}
[data-theme=dark] .sp-w{color:#6B8AFF}
@keyframes spR{to{opacity:1;clip-path:inset(0 0 0 0)}}
</style>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
<link rel="stylesheet" href="css/style.css?v=8">

<body>
<div id="splash"><div class="sp-w">Vane</div></div>
<div id="app"></div>

<script src="js/api.js?v=8"></script>
<script src="js/components/reader.js?v=8"></script>
<script src="js/app.js?v=8"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).then(function(reg){
      reg.update();
      setInterval(function(){ reg.update(); }, 60*60*1000);
    }).catch(function(){});
    var reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      if(reloaded)return; reloaded=true; location.reload();
    });
  });
}
</script>
